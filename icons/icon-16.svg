<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 16×16-optimized: edge-to-edge paper, one bold ink line, prominent gold tag.
       No background frame — at this size every pixel of the icon must carry signal. -->

  <!-- back sheet hint (1px peek on left) -->
  <rect x="1" y="3" width="11" height="12" fill="#f5edd6" stroke="#ebe1c8" stroke-width="1"/>

  <!-- front sheet -->
  <rect x="3" y="1" width="11" height="13" fill="#fefcf3" stroke="#856d43" stroke-width="1"/>

  <!-- single ink text line -->
  <rect x="5" y="6"  width="6" height="1" fill="#1c1917"/>
  <rect x="5" y="9"  width="5" height="1" fill="#856d43" fill-opacity="0.7"/>
  <rect x="5" y="11" width="4" height="1" fill="#856d43" fill-opacity="0.6"/>

  <!-- gold bookmark tag, top-right -->
  <path d="M 11 1 L 14 1 L 14 5 L 12.5 4 L 11 5 Z" fill="#a16207"/>
</svg>
